# =============================================================
# WormSort V4 Tracker Configuration
# =============================================================
# 用法: 将此文件放在 ultralytics/cfg/trackers/wormsort.yaml
#       然后 model.track(source, tracker="wormsort.yaml")

tracker_type: wormsort

# ── 基础追踪参数 (与 BoT-SORT/ByteTrack 一致) ──
track_high_thresh: 0.4       # 高分检测阈值
track_low_thresh: 0.1        # 低分检测阈值 (ByteTrack 第二阶段)
new_track_thresh: 0.7        # 新轨迹初始化最低分数
track_buffer: 30             # 轨迹丢失后保留帧数
match_thresh: 0.7            # 第一阶段匹配阈值

# ── BoT-SORT 继承参数 ──
fuse_score: True             # 是否融合检测分数
gmc_method: sparseOptFlow    # 全局运动补偿方法
proximity_thresh: 0.5        # ReID 近邻阈值
appearance_thresh: 0.25      # ReID 外观阈值
with_reid: False             # 蠕虫场景不用 ReID

# =============================================================
# WormSort V4 专属参数
# =============================================================

# ── 四模态融合权重 (必须加起来 = 1.0) ──
w_iou: 0.6                   # IoU 空间重叠权重
w_mid: 0.1                   # 骨架中点距离权重 (UKF 预测)
w_curv: 0.2                  # 骨架曲率相似度权重
w_len: 0.1                   # 骨架长度一致性权重

# ── EMA 平滑系数 ──
alpha_update: 0.7            # 正常更新时的 EMA alpha (越大越信任新数据)
alpha_reactivate: 0.9        # 重激活时的 EMA alpha (丢失后重新找到，更信任新数据)

# ── UKF (CTRV 模型) 参数 ──
ukf_q_pos: 4.0               # 过程噪声: 位置 (像素^2)
ukf_q_vel: 2.0               # 过程噪声: 速度
ukf_q_theta: 0.3             # 过程噪声: 方向角 (rad^2)
ukf_q_omega: 0.1             # 过程噪声: 角速度
ukf_r_pos: 2.0               # 观测噪声: 位置 (骨架中点提取精度)

# ── 骨架特征参数 ──
curvature_samples: 10        # 曲率采样点数
min_skeleton_points: 5       # 最少骨架点数 (低于此值视为提取失败)
